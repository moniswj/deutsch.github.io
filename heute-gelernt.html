<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">

<title>heute gelernt</title>

<style>

body{

    margin:0;

    background:#111;

    color:white;

    font-family:Arial,sans-serif;

}

h1{

    text-align:center;

    margin-top:20px;

}

.calendar{

    width:90%;

    max-width:900px;

    margin:auto;

    display:grid;

    grid-template-columns:repeat(7,1fr);

    gap:10px;

    margin-top:40px;

}

.day{

    background:#222;

    min-height:80px;

    border-radius:10px;

    cursor:pointer;

    padding:10px;

    text-align:center;

}

.day:hover{

    background:#333;

}

.learned{

    border:2px solid #2ecc71;
}

.details{

    width:80%;

    margin:40px auto;

    background:#222;

    border-radius:15px;

    padding:20px;

}

</style>

</head>

<body>

<h1>Heute gelernt</h1>

<div id="calendar" class="calendar"></div>

<div id="details" class="details">

Kliknij dzień.

</div>

<script>

let calendar =
document.getElementById("calendar");

let details =
document.getElementById("details");

let history =
JSON.parse(localStorage.getItem("learningHistory")) || {};

let year = new Date().getFullYear();
let month = new Date().getMonth();

let days =
new Date(year,month+1,0).getDate();

for(let d=1; d<=days; d++){

    let dateString =
    `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let div =
    document.createElement("div");

    div.className = "day";

    if(history[dateString]){
        div.classList.add("learned");
        div.innerHTML = d + " ✓";
    }
    else{
        div.innerHTML = d;
    }

    div.onclick = function(){

        let html =
        "<h2>"+dateString+"</h2>";

        if(history[dateString]){

            history[dateString].forEach(item=>{

                html += "✓ " + item + "<br>";

            });

        }else{

            html += "Brak zapisanej nauki.";

        }

        details.innerHTML = html;
    }

    calendar.appendChild(div);
}

</script>

</body>
</html>
