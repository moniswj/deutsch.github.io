<h1>Quiz z języka niemieckiego</h1>

<h2>Pytanie 1</h2>

<p>Jak jest po niemiecku "Cześć"?</p>

<button onclick="sprawdz(1)">Hallo</button>
<button onclick="zle()">Danke</button>
<button onclick="zle()">Haus</button>

<h2>Pytanie 2</h2>

<p>Co oznacza "Haus"?</p>

<button onclick="zle()">Kot</button>
<button onclick="sprawdz(2)">Dom</button>
<button onclick="zle()">Samochód</button>

<h2>Pytanie 3</h2>

<p>Jak jest po niemiecku "Dziękuję"?</p>

<button onclick="zle()">Tschüss</button>
<button onclick="sprawdz(3)">Danke</button>
<button onclick="zle()">Bitte</button>

<h2>Wynik</h2>

<p id="wynik">0 punktów</p>

<script>

let punkty = 0;
let odpowiedz1 = false;
let odpowiedz2 = false;
let odpowiedz3 = false;

function sprawdz(nr){

if(nr===1 && !odpowiedz1){
punkty++;
odpowiedz1=true;
}

if(nr===2 && !odpowiedz2){
punkty++;
odpowiedz2=true;
}

if(nr===3 && !odpowiedz3){
punkty++;
odpowiedz3=true;
}

document.getElementById("wynik").innerHTML =
punkty + " z 3 punktów";

}

function zle(){
alert("Niepoprawna odpowiedź. Spróbuj ponownie!");
}

</script>
