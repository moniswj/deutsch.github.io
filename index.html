<!DOCTYPE html>

<title>Nauka Niemieckiego</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
}

#mapa{
    position:relative;
    width:100vw;
    height:100vh;
}

#earth{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Niemcy */

#niemcy{
    position:absolute;

    /* położenie nad Niemcami */
    top:34%;
    left:47.8%;

    width:95px;
    height:125px;

    cursor:pointer;

    transition:0.3s;

    filter:
    drop-shadow(0 0 8px #ffce00)
    drop-shadow(0 0 15px #ffce00);
}

#niemcy:hover{
    transform:scale(1.12);
}

#niemcy svg{
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<div id="mapa">

<img src="earth.png" id="earth" alt="Ziemia">

<a href="mapa-niemiec.html" id="niemcy">
