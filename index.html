<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nauka Niemieckiego</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
}

#mapa{
    position:relative;
    width:100vw;
    height:100vh;
}

#earth{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Przycisk Niemiec */

#niemcy{
    position:absolute;

    /* Położenie nad Niemcami */
    top:38%;
    left:49%;

    width:80px;
    height:100px;

    cursor:pointer;

    transition:0.3s;

    filter:drop-shadow(0 0 15px gold);
}

#niemcy:hover{
    transform:scale(1.1);
}

/* Kształt Niemiec */

#niemcy svg{
    width:100%;
    height:100%;
}

</style>
</head>

<body>

<div id="mapa">

    <img src="earth.png" id="earth" alt="Ziemia">

    <a href="mapa-niemiec.html" id="niemcy">

        <svg viewBox="0 0 100 140">

            <path
            d="
            M45 5
            L65 10
            L75 25
            L70 40
            L82 55
            L75 72
            L82 90
            L70 110
            L60 135
            L40 130
            L25 118
            L15 100
            L20 78
            L10 60
            L18 42
            L28 28
            L30 15
            Z"
            fill="url(#germanyFlag)"
            stroke="white"
            stroke-width="2"
            />

            <defs>

                <linearGradient
                id="germanyFlag"
                x1="0"
                y1="0"
                x2="0"
                y2="1">

                    <stop offset="33%" stop-color="black"/>
                    <stop offset="33%" stop-color="#dd0000"/>

                    <stop offset="66%" stop-color="#dd0000"/>
                    <stop offset="66%" stop-color="#ffce00"/>

                    <stop offset="100%" stop-color="#ffce00"/>

                </linearGradient>

            </defs>

        </svg>

    </a>

</div>

</body>
</html>
