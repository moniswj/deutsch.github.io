<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Was kann man nach einem Deutschkurs A1?
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:#eaf3ff;

overflow:hidden;

}

.header{

height:80px;

display:flex;

justify-content:center;
align-items:center;

font-size:34px;
font-weight:bold;

color:#123d6b;

background:white;

box-shadow:0 2px 10px rgba(0,0,0,.1);

z-index:10;

position:relative;

}

.scene{

position:relative;

height:calc(100vh - 180px);

background:
url("karlsruhe.png");

background-size:cover;
background-position:center;

overflow:hidden;

}

.character{

position:absolute;

bottom:20px;

width:260px;

transition:.3s;

filter:drop-shadow(
0 10px 20px rgba(0,0,0,.25)
);

}

#anna{

left:60px;

}

#max{

right:60px;

}

.active{

transform:scale(1.08);

}

.bubble{

position:absolute;

top:50px;

left:50%;

transform:translateX(-50%);

width:600px;

min-height:140px;

background:white;

border-radius:30px;

padding:25px;

box-shadow:
0 10px 30px rgba(0,0,0,.2);

text-align:center;

}

#speaker{

font-size:26px;

font-weight:bold;

color:#21538a;

margin-bottom:15px;

}

#speech{

font-size:30px;

color:#222;

line-height:1.4;

}

.controls{

height:100px;

background:white;

display:flex;

justify-content:center;
align-items:center;

gap:20px;

box-shadow:
0 -2px 10px rgba(0,0,0,.1);

}

button{

padding:14px 28px;

font-size:20px;

border:none;

border-radius:25px;

cursor:pointer;

font-weight:bold;

}

.play{

background:#58cc02;
color:white;

}

.pause{

background:#f4b400;
color:white;

}

.next{

background:#1a73e8;
color:white;

}

.progress-wrap{

position:absolute;

left:50%;

transform:translateX(-50%);

bottom:115px;

width:70%;

height:18px;

background:#ddd;

border-radius:20px;

overflow:hidden;

}

.progress{

width:0%;

height:100%;

background:#58cc02;

transition:.5s;

}

.counter{

position:absolute;

right:30px;

bottom:145px;

background:white;

padding:10px 16px;

border-radius:20px;

font-weight:bold;

}

.blink{

animation:blink 5s infinite;
}

@keyframes blink{

0%,95%,100%{
transform:scaleY(1);
}

97%{
transform:scaleY(.97);
}

}

.talking{

animation:talk .25s infinite;
}

@keyframes talk{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

</style>

</head>

<body>

<div class="header">

Was kann man nach einem Deutschkurs A1?

</div>

<div class="scene">

<div class="bubble">

<div id="speaker">

Anna

</div>

<div id="speech">

Klicke auf Abspielen

</div>

</div>

<img
src="anna.png"
id="anna"
class="character">

<img
src="max.png"
id="max"
class="character">

<div class="progress-wrap">

<div
class="progress"
id="progress">
</div>

</div>

<div
class="counter"
id="counter">

0 / 0

</div>

</div>

<div class="controls">

<button
class="play"
onclick="startMovie()">

▶ Abspielen

</button>

<button
class="pause"
onclick="pauseMovie()">

⏸ Pause

</button>

<button
class="next"
onclick="nextManual()">

⏭ Weiter

</button>

</div>

<script>

const dialogs=[

["Anna","Hallo!"],
["Max","Hallo! Wie geht's?"],

["Anna","Gut, danke. Und dir?"],
["Max","Auch gut, danke."],

["Anna","Wie heißt du?"],
["Max","Ich heiße Max. Und du?"],

["Anna","Ich heiße Anna."],

["Max","Woher kommst du?"],

["Anna","Ich komme aus Polen. Und du?"],

["Max","Ich komme aus Deutschland."],

["Anna","Wo wohnst du?"],

["Max","Ich wohne in Berlin. Und du?"],

["Anna","Ich wohne in Frankfurt."],

["Max","Wie alt bist du?"],

["Anna","Ich bin 29 Jahre alt. Und du?"],

["Max","Ich bin 31."],

["Anna","Was machst du beruflich?"],

["Max","Ich arbeite als Techniker."],

["Anna","Ich arbeite im Büro."],

["Max","Sehr gut!"],

["Anna","Hast du Familie?"],

["Max","Ja. Ich habe eine Frau und zwei Kinder."],

["Anna","Schön! Ich habe einen Bruder und eine Schwester."],

["Max","Was machst du gern in deiner Freizeit?"],

["Anna","Ich lese gern, höre Musik und gehe spazieren."],

["Max","Ich spiele Fußball und fahre Fahrrad."],

["Anna","Hast du Hunger?"],

["Max","Ja, ein bisschen."],

["Anna","Möchtest du einen Kaffee?"],

["Max","Ja, gern. Danke!"],

["Anna","Bitte."],

["Max","Wie viel kostet ein Kaffee?"],

["Anna","Drei Euro."],

["Max","Das ist gut."],

["Max","Entschuldigung, wo ist der Bahnhof?"],

["Anna","Der Bahnhof ist dort, links neben dem Supermarkt."],

["Max","Danke für die Hilfe!"],

["Anna","Gern geschehen."],

["Max","Hallo?"],

["Anna","Hallo Max! Kommst du heute zum Deutschkurs?"],

["Max","Ja, natürlich. Um wie viel Uhr?"],

["Anna","Um 18 Uhr."],

["Max","Perfekt. Bis später!"],

["Anna","Bis später!"],

["Anna","Nach einem Deutschkurs A1 kann ich mich vorstellen."],

["Max","Ich kann Fragen stellen und beantworten."],

["Anna","Ich kann über meine Familie, meine Arbeit und mein Hobby sprechen."],

["Max","Ich kann einfache Gespräche im Alltag führen."],

["Anna","Zum Beispiel im Café, bei der Arbeit oder auf der Straße."],

["Max","Deutsch lernen macht Spaß!"],

["Anna","Viel Erfolg beim Deutschlernen!"],

["Beide","Tschüss!"]

];

let index=0;

let paused=false;

let timer=null;

let voices=[];

window.speechSynthesis.onvoiceschanged=function(){

voices=window.speechSynthesis.getVoices();

};

function speak(text,person){

window.speechSynthesis.cancel();

const speech=
new SpeechSynthesisUtterance(text);

speech.lang="de-DE";

speech.rate=0.92;

speech.pitch=1;

if(person==="Anna"){

let female=voices.find(v=>

v.lang.includes("de")

);

if(female){

speech.voice=female;

speech.pitch=1.2;

}

}

if(person==="Max"){

let male=voices.find(v=>

v.lang.includes("de")

);

if(male){

speech.voice=male;

speech.pitch=0.85;

}

}

speechSynthesis.speak(speech);

}

function startMovie(){

paused=false;

index=0;

nextDialog();

}

function pauseMovie(){

paused=!paused;

if(paused){

speechSynthesis.pause();

}else{

speechSynthesis.resume();

}

}

function nextManual(){

clearTimeout(timer);

nextDialog();

}
function nextDialog(){

if(paused){
return;
}

if(index>=dialogs.length){

document.getElementById("speaker").innerHTML=
"Koniec";

document.getElementById("speech").innerHTML=
"Film beendet";

document.getElementById("progress").style.width=
"100%";

return;

}

let person=dialogs[index][0];

let text=dialogs[index][1];

document.getElementById("speaker").innerHTML=
person;

document.getElementById("speech").innerHTML=
text;

/* reset postaci */

document.getElementById("anna")
.classList.remove("active","talking");

document.getElementById("max")
.classList.remove("active","talking");

/* aktywna postać */

if(person==="Anna"){

document.getElementById("anna")
.classList.add("active","talking");

}

if(person==="Max"){

document.getElementById("max")
.classList.add("active","talking");

}

if(person==="Beide"){

document.getElementById("anna")
.classList.add("active","talking");

document.getElementById("max")
.classList.add("active","talking");

}

/* głos */

speak(text,person);

/* licznik */

document.getElementById("counter")
.innerHTML=

(index+1)

+

" / "

+

dialogs.length;

/* pasek postępu */

let percent=

((index+1)

/

dialogs.length)

*100;

document.getElementById("progress")
.style.width=

percent+"%";

index++;

timer=setTimeout(

nextDialog,

4500

);

}
</script>

</body>

</html>
