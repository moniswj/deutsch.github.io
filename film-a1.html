.bubble {

  pointer-events: none;
  white-space: normal;
  z-index: 10;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.10));
}
.bubble-tail {
  position: absolute;
  width: 14px; height: 14px;
  background: #fff;
  border-right: 2px solid #5DCAA5;
  border-bottom: 2px solid #5DCAA5;

.char-name {

#scene-label {

  font-weight: 700;
  padding: 5px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity 0.4s;
  white-space: nowrap;
  z-index: 20;
}
#progress-bar {
  height: 4px;
  background: #e1f5ee;
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #1D9E75, #5DCAA5);
  width: 0%;

#controls {

const positions = {
  platz: {anna:'60%', max:'27%'},
  cafe:  {anna:'58%', max:'25%'},
  phone: {anna:'68%', max:'15%'},
  both:  {anna:'58%', max:'28%'},
};

function speak(text, who) {
  if (!voiceOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'de-DE';
  u.rate = 0.95;
  u.pitch = who === 'anna' ? 1.3 : 0.85;
  u.volume = 1;
  const voices = window.speechSynthesis.getVoices();
  const deVoices = voices.filter(v => v.lang.startsWith('de'));
  if (deVoices.length) {
    if (who === 'anna') {
      const fem = deVoices.find(v => /female|frau|anna|hedda|marlene/i.test(v.name)) || deVoices[deVoices.length-1];
      u.voice = fem;
    } else {
      const male = deVoices.find(v => /male|mann|hans|stefan|max/i.test(v.name)) || deVoices[0];
      u.voice = male;
    }
  }
  window.speechSynthesis.speak(u);
}

function clearBubbles() {
  bubbleAnna.style.opacity = '0';
  bubbleMax.style.opacity = '0';
  setMouth('anna', false);
  setMouth('max', false);
}

function runStep() {
  if (paused || step >= script.length) return;
  const s = script[step];
  const pos = positions[s.scene] || positions.platz;

  drawBg(s.scene);
  annaWrap.style.left = pos.anna;
  maxWrap.style.left = pos.max;

  clearBubbles();

  if (s.who === 'scene') {
    sceneLabel.textContent = s.text;
    sceneLabel.style.opacity = '1';
    setTimeout(() => sceneLabel.style.opacity = '0', s.dur - 500);
  } else if (s.who === 'anna') {
    // remove tail text from bubble
    bubbleAnna.childNodes[0].textContent = s.text;
    bubbleAnna.style.opacity = '1';
    setMouth('anna', true);
    speak(s.text, 'anna');
    sceneLabel.style.opacity = '0';
    setTimeout(() => setMouth('anna', false), Math.min(s.dur - 300, 1500));
  } else if (s.who === 'max') {
    bubbleMax.childNodes[0].textContent = s.text;
    bubbleMax.style.opacity = '1';
    setMouth('max', true);
    speak(s.text, 'max');
    sceneLabel.style.opacity = '0';
    setTimeout(() => setMouth('max', false), Math.min(s.dur - 300, 1500));
  } else if (s.who === 'both') {
    bubbleAnna.childNodes[0].textContent = s.text;
    bubbleMax.childNodes[0].textContent = s.text;
    bubbleAnna.style.opacity = '1';
    bubbleMax.style.opacity = '1';
    setMouth('anna', true); setMouth('max', true);
    speak(s.text, 'anna');
    sceneLabel.style.opacity = '0';
    setTimeout(() => { setMouth('anna', false); setMouth('max', false); }, 1000);
  }

  elapsed += s.dur;
  progressFill.style.width = Math.min(100, (elapsed / totalDur) * 100) + '%';

  step++;
  timer = setTimeout(runStep, s.dur);
}

function startAnimation() {
  document.getElementById('title-overlay').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  // preload voices
  window.speechSynthesis.getVoices();
  setTimeout(runStep, 300);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶ Dalej' : '⏸ Pauza';
  if (paused) {
    clearTimeout(timer);
    window.speechSynthesis.cancel();
  } else {
    runStep();
  }
}

function restartAnim() {
  clearTimeout(timer);
  window.speechSynthesis.cancel();
  step = 0; elapsed = 0; paused = false;
  document.getElementById('pause-btn').textContent = '⏸ Pauza';
  clearBubbles();
  sceneLabel.style.opacity = '0';
  progressFill.style.width = '0%';
  lastScene = '';
  drawBg('platz');
  runStep();
}

function toggleVoice() {
  voiceOn = !voiceOn;
  document.getElementById('voice-btn').textContent = voiceOn ? '🔊 Głos: WŁ' : '🔇 Głos: WYŁ';
  if (!voiceOn) window.speechSynthesis.cancel();
}

// preload voices on page load
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// init bg
drawBg('platz');
</script>
