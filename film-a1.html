<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Was kann man nach einem Deutschkurs A1?</title>
<style>
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6fb;color:#1f2937}
  .wrap{max-width:1100px;margin:0 auto;padding:24px}
  .stage{position:relative;aspect-ratio:16/9;background:linear-gradient(#dff3ff,#ffffff 55%,#e9f7df);border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.12)}
  .sky{position:absolute;inset:0;background:linear-gradient(#cfeeff 0%, #f8fcff 55%, #dff4d8 100%)}
  .sun{position:absolute;right:70px;top:50px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%, #fff8b3, #ffd24d 65%, #ffb800 100%);opacity:.95}
  .ground{position:absolute;left:0;right:0;bottom:0;height:33%;background:linear-gradient(#8ed36d,#74c255)}
  .plaza{position:absolute;left:10%;right:10%;bottom:8%;height:18%;border-radius:50% 50% 0 0;background:rgba(255,255,255,.18);filter:blur(1px)}
  .cafe{position:absolute;right:9%;bottom:21%;width:17%;height:22%;background:#fff2d8;border:4px solid #a56b3f;border-bottom-width:8px;border-radius:10px}
  .cafe:before{content:"";position:absolute;left:12%;top:18%;right:12%;height:18%;background:#7dc8ff;border-radius:6px}
  .cafe:after{content:"CAFE";position:absolute;left:50%;top:-18px;transform:translateX(-50%);font-weight:bold;color:#8a4b20;letter-spacing:2px}
  .bench{position:absolute;left:12%;bottom:24%;width:160px;height:40px;background:#8b5e3c;border-radius:8px}
  .bench:before,.bench:after{content:"";position:absolute;bottom:-34px;width:14px;height:34px;background:#6d4628}
  .bench:before{left:18px}.bench:after{right:18px}
  .person{position:absolute;width:260px;height:520px;bottom:10%;filter:drop-shadow(0 10px 14px rgba(0,0,0,.18));transform-origin:center bottom;animation:idle 4s ease-in-out infinite}
  .anna{left:16%}.max{right:16%;animation-delay:1.5s}
  .head{position:absolute;left:50%;top:0;transform:translateX(-50%);width:170px;height:170px;border-radius:50%;background:linear-gradient(#f0c08a,#e8ab72);overflow:hidden}
  .hair{position:absolute;inset:-10px -8px auto -8px;height:120px;background:linear-gradient(#8a5a33,#4f2b17);border-radius:50% 50% 45% 45%/58% 58% 42% 42%}
  .hair:after{content:"";position:absolute;left:18px;right:18px;top:48px;height:88px;border-radius:45% 45% 50% 50%;background:inherit;clip-path:polygon(0 0,100% 0,86% 100%,14% 100%)}
  .face{position:absolute;left:50%;top:32px;transform:translateX(-50%);width:96px;height:96px;border-radius:18px;background:rgba(255,255,255,.06)}
  .body{position:absolute;left:50%;top:145px;transform:translateX(-50%);width:180px;height:220px;border-radius:40px 40px 28px 28px;background:linear-gradient(#2563eb,#1d4ed8)}
  .anna .body{background:linear-gradient(#2f9f57,#1f7a41)}
  .arm{position:absolute;top:182px;width:92px;height:220px;border-radius:46px;background:#f0c08a;transform-origin:top center}
  .leftarm{left:8px;transform:rotate(18deg)}
  .rightarm{right:8px;transform:rotate(-16deg)}
  .hand{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:74px;height:82px;border-radius:20px;background:#f0c08a}
  .max .rightarm{animation:wave 1.6s ease-in-out infinite}
  .eye{position:absolute;top:74px;width:16px;height:16px;border-radius:50%;background:#1f2937}
  .eye.l{left:66px}.eye.r{right:66px}
  .mouth{position:absolute;left:50%;top:108px;transform:translateX(-50%);width:40px;height:18px;border-bottom:4px solid #9b4b3f;border-radius:0 0 40px 40px}
  .blush{position:absolute;top:94px;width:18px;height:10px;border-radius:50%;background:rgba(244,114,182,.22)}
  .blush.l{left:42px}.blush.r{right:42px}
  .shirtline{position:absolute;left:50%;top:184px;transform:translateX(-50%);width:72px;height:8px;border-radius:99px;background:rgba(255,255,255,.65)}
  .drawstring{position:absolute;left:50%;top:190px;transform:translateX(-50%);width:2px;height:28px;background:#fff;border-radius:99px;box-shadow:-14px 0 0 #fff,14px 0 0 #fff}
  .caption{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(17,24,39,.68);color:#fff;padding:14px 18px;border-radius:14px;font-size:18px;max-width:86%;text-align:center;backdrop-filter:blur(6px)}
  .subtitle{position:absolute;left:50%;bottom:88px;transform:translateX(-50%);background:rgba(255,255,255,.82);color:#111827;padding:10px 14px;border-radius:999px;font-size:16px;opacity:0;transition:.3s}
  .subtitle.show{opacity:1}
  .talk .mouth{animation:m1 .42s linear infinite}
  .talk .face{animation:head .9s ease-in-out infinite}
  .talk .body{animation:body .9s ease-in-out infinite}
  .talk .arm{animation:arm .9s ease-in-out infinite}
  @keyframes idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes wave{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(18deg)}}
  @keyframes m1{0%,100%{height:12px;width:34px}50%{height:18px;width:44px}}
  @keyframes head{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
  @keyframes body{0%,100%{transform:translateX(-50%) rotate(0deg)}50%{transform:translateX(-50%) rotate(-1deg)}}
  @keyframes arm{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(-4deg)}}
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;align-items:center}
  button{border:0;background:#2563eb;color:#fff;padding:12px 18px;border-radius:12px;font-size:16px;cursor:pointer}
  button.secondary{background:#e5e7eb;color:#111827}
  .small{font-size:14px;color:#6b7280}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage" id="stage">
    <div class="sky"></div><div class="sun"></div><div class="ground"></div><div class="plaza"></div><div class="bench"></div><div class="cafe"></div>

    <div class="person max" id="max">
      <div class="head"><div class="hair"></div><div class="face">
        <div class="eye l"></div><div class="eye r"></div>
        <div class="blush l"></div><div class="blush r"></div>
        <div class="mouth"></div>
      </div></div>
      <div class="arm leftarm"><div class="hand"></div></div>
      <div class="arm rightarm"><div class="hand"></div></div>
      <div class="body"><div class="shirtline"></div><div class="drawstring"></div></div>
    </div>

    <div class="person anna" id="anna">
      <div class="head"><div class="hair"></div><div class="face">
        <div class="eye l"></div><div class="eye r"></div>
        <div class="blush l"></div><div class="blush r"></div>
        <div class="mouth"></div>
      </div></div>
      <div class="arm leftarm"><div class="hand"></div></div>
      <div class="arm rightarm"><div class="hand"></div></div>
      <div class="body" style="background:linear-gradient(#34a853,#1e8f46)"><div class="shirtline"></div></div>
    </div>

    <div class="subtitle" id="subtitle"></div>
    <div class="caption">Was kann man nach einem Deutschkurs A1?</div>
  </div>

  <div class="controls">
    <button id="playBtn">Start dialogu</button>
    <button class="secondary" id="stopBtn">Stop</button>
    <span class="small">Głosy są generowane przez Web Speech API, a postacie animują się podczas mówienia.</span>
  </div>
</div>

<script>
const lines = [
  {speaker:'Anna', text:'Hallo!'},
  {speaker:'Max', text:'Hallo! Wie gehts?'},
  {speaker:'Anna', text:'Gut, danke. Und dir?'},
  {speaker:'Max', text:'Auch gut, danke.'},
  {speaker:'Anna', text:'Wie heißt du?'},
  {speaker:'Max', text:'Ich heiße Max. Und du?'},
  {speaker:'Anna', text:'Ich heiße Anna.'},
  {speaker:'Max', text:'Woher kommst du?'},
  {speaker:'Anna', text:'Ich komme aus Polen. Und du?'},
  {speaker:'Max', text:'Ich komme aus Deutschland.'},
  {speaker:'Anna', text:'Wo wohnst du?'},
  {speaker:'Max', text:'Ich wohne in Berlin. Und du?'},
  {speaker:'Anna', text:'Ich wohne in Frankfurt.'},
  {speaker:'Max', text:'Wie alt bist du?'},
  {speaker:'Anna', text:'Ich bin 29 Jahre alt. Und du?'},
  {speaker:'Max', text:'Ich bin 31.'},
  {speaker:'Anna', text:'Was machst du beruflich?'},
  {speaker:'Max', text:'Ich arbeite als Techniker. Und du?'},
  {speaker:'Anna', text:'Ich arbeite im Büro.'},
  {speaker:'Max', text:'Sprichst du Deutsch jeden Tag?'},
  {speaker:'Anna', text:'Ja, ein bisschen. Ich lerne Deutsch und spreche mit meinen Kollegen.'},
  {speaker:'Max', text:'Sehr gut!'},
  {speaker:'Anna', text:'Hast du Familie?'},
  {speaker:'Max', text:'Ja. Ich habe eine Frau und zwei Kinder.'},
  {speaker:'Anna', text:'Schön! Ich habe einen Bruder und eine Schwester.'},
  {speaker:'Max', text:'Was machst du gern in deiner Freizeit?'},
  {speaker:'Anna', text:'Ich lese gern, höre Musik und gehe spazieren. Und du?'},
  {speaker:'Max', text:'Ich spiele Fußball und fahre Fahrrad.'},
  {speaker:'Anna', text:'Hast du Hunger?'},
  {speaker:'Max', text:'Ja, ein bisschen.'},
  {speaker:'Anna', text:'Möchtest du einen Kaffee?'},
  {speaker:'Max', text:'Ja, gern. Danke!'},
  {speaker:'Anna', text:'Bitte.'},
  {speaker:'Max', text:'Wie viel kostet ein Kaffee?'},
  {speaker:'Anna', text:'Drei Euro.'},
  {speaker:'Max', text:'Das ist gut.'},
  {speaker:'Max', text:'Entschuldigung, wo ist der Bahnhof?'},
  {speaker:'Anna', text:'Der Bahnhof ist dort, links neben dem Supermarkt.'},
  {speaker:'Max', text:'Danke für die Hilfe!'},
  {speaker:'Anna', text:'Gern geschehen.'},
  {speaker:'Max', text:'Hallo?'},
  {speaker:'Anna', text:'Hallo Max! Kommst du heute zum Deutschkurs?'},
  {speaker:'Max', text:'Ja, natürlich. Um wie viel Uhr?'},
  {speaker:'Anna', text:'Um 18 Uhr.'},
  {speaker:'Max', text:'Perfekt. Bis später!'},
  {speaker:'Anna', text:'Bis später!'},
  {speaker:'Anna', text:'Nach einem Deutschkurs A1 kann ich mich vorstellen.'},
  {speaker:'Max', text:'Ich kann Fragen stellen und beantworten.'},
  {speaker:'Anna', text:'Ich kann über meine Familie, meine Arbeit und mein Hobby sprechen.'},
  {speaker:'Max', text:'Ich kann einfache Gespräche im Alltag führen.'},
  {speaker:'Anna', text:'Zum Beispiel im Café, bei der Arbeit oder auf der Straße.'},
  {speaker:'Max', text:'Deutsch lernen macht Spaß!'},
  {speaker:'Anna', text:'Viel Erfolg beim Deutschlernen!'},
  {speaker:'Both', text:'Tschüss!'}
];

const subtitle = document.getElementById('subtitle');
const anna = document.getElementById('anna');
const max = document.getElementById('max');
let playing = false;

function setActive(name){
  anna.classList.toggle('talk', name==='Anna' || name==='Both');
  max.classList.toggle('talk', name==='Max' || name==='Both');
}

function speakLine(i){
  if(!playing || i>=lines.length) return stop();
  const line = lines[i];
  subtitle.textContent = `${line.speaker}: ${line.text}`;
  subtitle.classList.add('show');
  setActive(line.speaker);

  const utter = new SpeechSynthesisUtterance(line.text);
  utter.lang = 'de-DE';
  utter.rate = 0.95;
  utter.pitch = line.speaker==='Anna' ? 1.15 : 0.95;
  utter.volume = 1;

  const voices = speechSynthesis.getVoices();
  const de = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('de'));
  if(de) utter.voice = de;

  utter.onend = () => setTimeout(()=>speakLine(i+1), 260);
  utter.onerror = () => setTimeout(()=>speakLine(i+1), 260);
  speechSynthesis.speak(utter);
}

function play(){
  stop();
  playing = true;
  speakLine(0);
}

function stop(){
  playing = false;
  setActive('');
  subtitle.classList.remove('show');
  speechSynthesis.cancel();
}

document.getElementById('playBtn').onclick = play;
document.getElementById('stopBtn').onclick = stop;
</script>
</body>
</html>
