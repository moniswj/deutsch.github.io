<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Was kann man nach einem Deutschkurs A1?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(
    135deg,
    #1c355e,
    #2e8b78);

    font-family:Arial,sans-serif;

    min-height:100vh;

    color:white;

    overflow:hidden;
}

h1{

    text-align:center;

    margin-top:20px;

    font-size:34px;

    text-shadow:2px 2px 5px rgba(0,0,0,.4);
}

.scene{

    width:1000px;

    max-width:95%;

    height:560px;

    margin:20px auto;

    background:
    linear-gradient(
    rgba(255,255,255,.05),
    rgba(255,255,255,.05));

    border-radius:25px;

    position:relative;

    overflow:hidden;

    backdrop-filter:blur(5px);

    box-shadow:
    0 0 30px rgba(0,0,0,.4);
}

/* TŁO MIASTA */

.city{

    position:absolute;

    bottom:0;

    width:100%;

    height:230px;

    background:
    linear-gradient(
    #5d86c9,
    #89b6ff);

}

.city::before{

    content:"";

    position:absolute;

    bottom:0;

    left:0;

    width:100%;

    height:120px;

    background:
    repeating-linear-gradient(
    90deg,
    #c8c8c8 0 80px,
    #b0b0b0 80px 160px);

}

/* POSTACIE */

.character{

    position:absolute;

    bottom:60px;

    width:170px;

    height:300px;

    transition:.3s;
}

.character.active{

    transform:scale(1.08);
}

/* ANNA */

#anna{

    left:180px;
}

/* MAX */

#max{

    right:180px;
}

.head{

    width:95px;
    height:95px;

    border-radius:50%;

    background:#ffd6ad;

    margin:auto;

    position:relative;
}

.hair-female{

    position:absolute;

    width:105px;
    height:60px;

    background:#b36a2f;

    border-radius:50px 50px 10px 10px;

    top:-10px;
    left:-5px;
}

.hair-male{

    position:absolute;

    width:90px;
    height:35px;

    background:#3f2d1b;

    border-radius:50px;

    top:-5px;
    left:2px;
}

/* OCZY */

.eye{

    width:10px;
    height:10px;

    background:black;

    border-radius:50%;

    position:absolute;

    top:40px;
}

.eye.left{

    left:28px;
}

.eye.right{

    right:28px;
}

/* USTA */

.mouth{

    width:26px;
    height:8px;

    background:#d66;

    border-radius:20px;

    position:absolute;

    bottom:18px;
    left:35px;

    transition:.2s;
}

.talking .mouth{

    height:20px;
}

/* CIAŁO */

.body{

    width:100px;
    height:150px;

    margin:auto;

    margin-top:5px;

    border-radius:20px;
}

.female{

    background:#d85aa5;
}

.male{

    background:#3a6fd6;
}

/* DYMKI */

.speech{

    position:absolute;

    top:50px;

    width:320px;

    min-height:120px;

    background:white;

    color:#222;

    border-radius:25px;

    padding:20px;

    font-size:24px;

    box-shadow:
    0 0 20px rgba(0,0,0,.25);

    display:none;
}

.speech.show{

    display:block;
}

#speechAnna{

    left:30px;
}

#speechMax{

    right:30px;
}

/* PANEL */

.controls{

    text-align:center;
}

button{

    padding:15px 35px;

    border:none;

    border-radius:40px;

    font-size:22px;

    cursor:pointer;

    background:#16a34a;

    color:white;

    margin-top:10px;
}

button:hover{

    transform:scale(1.05);
}

.progress{

    width:80%;

    height:18px;

    margin:25px auto;

    background:#ddd;

    border-radius:20px;

    overflow:hidden;
}

.bar{

    width:0%;

    height:100%;

    background:#22c55e;

    transition:.5s;
}

/* MRUGANIE */

.blink{

    animation:blink 4s infinite;
}

@keyframes blink{

0%,95%,100%{
height:10px;
}

97%{
height:1px;
}

}

</style>
</head>

<body>

<h1>Was kann man nach einem Deutschkurs A1?</h1>

<div class="scene">

<div class="speech" id="speechAnna"></div>

<div class="speech" id="speechMax"></div>

<div id="anna" class="character">

<div class="head">

<div class="hair-female"></div>

<div class="eye left blink"></div>
<div class="eye right blink"></div>

<div class="mouth"></div>

</div>

<div class="body female"></div>

</div>

<div id="max" class="character">

<div class="head">

<div class="hair-male"></div>

<div class="eye left blink"></div>
<div class="eye right blink"></div>

<div class="mouth"></div>

</div>

<div class="body male"></div>

</div>

<div class="city"></div>

</div>

<div class="controls">

<button onclick="startMovie()">
▶ Abspielen
</button>

<div class="progress">

<div class="bar" id="bar"></div>

</div>

</div>

function getVoice(lang){

    const voices = speechSynthesis.getVoices();

}

function speak(text,speaker){

    const utter =
    new SpeechSynthesisUtterance(text);

    utter.lang = "de-DE";

    utter.rate = 0.9;

    if(speaker==="Anna"){

        utter.pitch = 1.3;

    }else{

        utter.pitch = 0.9;

    }

    const voice = getVoice("de");

    if(voice){

        utter.voice = voice;

    }

    speechSynthesis.speak(utter);

    return utter;

}
