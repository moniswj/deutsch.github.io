<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Was kann man nach einem Deutschkurs A1?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
        180deg,
        #8fd3ff 0%,
        #d8f0ff 100%
    );

    min-height:100vh;

    overflow:hidden;
}

.header{

    text-align:center;

    padding:20px;

    color:#17324d;

    font-size:32px;

    font-weight:bold;
}

.scene{

    width:100%;
    height:70vh;

    position:relative;
}

.city{

    position:absolute;
    bottom:0;

    width:100%;
    height:180px;

    background:
    linear-gradient(
        #d5d5d5,
        #b7b7b7
    );
}

.character{

    position:absolute;

    width:180px;
    height:320px;

    transition:.5s;
}

.active{

    transform:scale(1.08);
}

.anna{

    left:18%;
    bottom:70px;
}

.max{

    right:18%;
    bottom:70px;
}

.head{

    width:120px;
    height:120px;

    background:#ffd7b5;

    border-radius:50%;

    position:relative;

    margin:auto;
}

.hair-anna{

    position:absolute;

    width:125px;
    height:65px;

    background:#f0b24b;

    border-radius:70px 70px 20px 20px;

    top:-10px;
    left:-3px;
}

.hair-max{

    position:absolute;

    width:120px;
    height:45px;

    background:#5a3a23;

    border-radius:60px 60px 10px 10px;

    top:0;
}

.eye{

    width:12px;
    height:12px;

    background:black;

    border-radius:50%;

    position:absolute;

    top:52px;
}

.eye.left{

    left:35px;
}

.eye.right{

    right:35px;
}

.mouth{

    width:34px;
    height:8px;

    background:#d85f5f;

    border-radius:20px;

    position:absolute;

    left:43px;
    top:82px;
}

.talking .mouth{

    animation:talk .3s infinite;
}

@keyframes talk{

    0%{
        height:8px;
    }

    50%{
        height:20px;
    }

    100%{
        height:8px;
    }

}

.blink .eye{

    animation:blink 5s infinite;
}

@keyframes blink{

    0%,95%,100%{
        height:12px;
    }

    97%{
        height:2px;
    }

}

.body{

    width:120px;
    height:160px;

    border-radius:20px;

    margin:10px auto;
}

.anna .body{

    background:#5b8cff;
}

.max .body{

    background:#39b56c;
}

.speech{

    position:absolute;

    top:80px;

    left:50%;

    transform:translateX(-50%);

    width:70%;

    min-height:120px;

    background:white;

    border-radius:25px;

    padding:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

    text-align:center;
}

.speaker{

    font-weight:bold;

    color:#1e4c84;

    margin-bottom:10px;

    font-size:24px;
}

.text{

    font-size:28px;

    color:#222;
}

.controls{

    position:absolute;

    bottom:20px;

    width:100%;

    text-align:center;
}

button{

    background:#2ea44f;

    color:white;

    border:none;

    padding:14px 30px;

    border-radius:50px;

    font-size:22px;

    cursor:pointer;
}

.progress-wrap{

    width:80%;

    height:18px;

    background:#ddd;

    border-radius:30px;

    margin:20px auto;
}

.progress{

    width:0%;

    height:100%;

    background:#2ea44f;

    border-radius:30px;

    transition:.5s;
}

</style>
</head>

<body>

<div class="header">
Was kann man nach einem Deutschkurs A1?
</div>

<div class="scene">

<div class="speech">

<div class="speaker" id="speaker">
Anna
</div>

<div class="text" id="speech">
Hallo!
</div>

</div>

<div class="character anna blink" id="anna">

<div class="head">

<div class="hair-anna"></div>

<div class="eye left"></div>
<div class="eye right"></div>

<div class="mouth"></div>

</div>

<div class="body"></div>

</div>

<div class="character max blink" id="max">

<div class="head">

<div class="hair-max"></div>

<div class="eye left"></div>
<div class="eye right"></div>

<div class="mouth"></div>

</div>

<div class="body"></div>

</div>

<div class="city"></div>

</div>

<div class="controls">

<button onclick="startMovie()">
▶ Abspielen
</button>

<div class="progress-wrap">
<div class="progress" id="progress"></div>
</div>

</div>

<script>

/* część 2 będzie tutaj */

</script>

</body>
</html>
